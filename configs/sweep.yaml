method: bayes
program: scripts/sweep.py
run_cap: 50
metric:
  name: val_f1
  goal: maximize

parameters:
  lr:
    values: [0.001, 0.0005]
  batch_size:
    values: [64, 128]
  pos_weight:
    values: [5, 10, 15, 20, 25, 30, 35]
  
  hidden_layers:
    values:
      - [64, 128, 64]
      - [128, 256, 128]

  activations:
    values:
      - ["relu", "relu", "relu"]
      - ["tanh", "tanh", "tanh"]
      - ["tanh", "relu", "tanh"]
